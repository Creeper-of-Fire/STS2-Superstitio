description = "造成{Damage:diff()}点伤害。"

[MASO_DEFEND]
title = "防御"
description = "获得{Block:diff()}点[gold]格挡[/gold]。"

# --- 攻击卡 (Attack) ---

[WHIP_OF_PENANCE]
title = "忏悔之鞭"
description = "造成{Damage:diff()}点伤害。失去{HpLoss:diff()}点生命。"

[BLOOD_RECKONING]
